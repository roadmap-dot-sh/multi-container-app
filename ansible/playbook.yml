---
- name: Setup Todo Application Server
  hosts: all
  # become: yes
  vars:
    docker_compose_version: "2.20.0"
    app_directory: "/opt/todo-app"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - virtualenv
          - python3-setuptools
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-{{ ansible_system | lower }}-{{ ansible_architecture }}"
        dest: /usr/local/bin/docker-compose
        mode: "0755"

    - name: Create application directory
      file:
        path: "{{ app_directory }}"
        state: directory
        mode: "0755"

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.prod.yml
        dest: "{{ app_directory }}/docker-compose.yml"
        mode: "0644"

    - name: Copy nginx configuration
      copy:
        src: ../nginx/nginx.conf
        dest: "{{ app_directory }}/nginx.conf"
        mode: "0644"

    - name: Create .env file
      copy:
        content: |
          MONGO_ROOT_USER={{ lookup('env', 'MONGO_ROOT_USER') }}
          MONGO_ROOT_PASSWORD={{ lookup('env', 'MONGO_ROOT_PASSWORD') }}
          DOCKER_USERNAME={{ lookup('env', 'DOCKER_USERNAME') }}
        dest: "{{ app_directory }}/.env"
        mode: "0600"

    - name: Pull and run containers
      docker_compose:
        project_src: "{{ app_directory }}"
        state: present
        restarted: yes
