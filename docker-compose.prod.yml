version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: todo-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: todoapp
    volumes:
      - mongodb_data_prod:/data/db
    networks:
      - todo-network-prod

  api:
    image: ${DOCKER_USERNAME}/todo-api:${GITHUB_SHA:-latest}
    container_name: todo-api-prod
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/todoapp?authSource=admin
    depends_on:
      - mongodb
    networks:
      - todo-network-prod

  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - todo-network-prod

volumes:
  mongodb_data_prod:
    driver: local

networks:
  todo-network-prod:
    driver: bridge
